services:
  - type: web
    name: yf-proxy
    runtime: python
    region: oregon          # US West — non-GCP IP range
    plan: free
    buildCommand: "pip install -r proxy-server/requirements.txt"
    startCommand: "python proxy-server/main.py"
    envVars:
      - key: PORT
        generateValue: false   # Render injects $PORT automatically
