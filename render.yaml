services:
  - type: web
    name: yf-proxy
    runtime: python
    region: oregon          # US West — non-GCP IP range
    plan: free
    rootDir: proxy-server
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"
    envVars:
      - key: PORT
        generateValue: false   # Render injects $PORT automatically
